; =============================================================================
; Chulx — Local Development PHP Overrides
; =============================================================================
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
memory_limit = 512M
display_errors = On
error_reporting = E_ALL

[opcache]
opcache.enable = 0
opcache.revalidate_freq = 0
